name: Publish Blueva Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
    timeout-minutes: 30

    env:
      BLUEVA_UPDATE_URL: "https://store.blueva.net/index.php?route=/api/v2/resources/update"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Resolve build version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          BUILD_DATE=$(date +%Y%m%d)
          VERSION="${BUILD_DATE}-${SHORT_SHA}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Build Maven project
        run: mvn -B clean package -Drevision=${{ steps.version.outputs.version }}

      - name: Locate generated JAR files
        id: jars
        run: |
          MC_JAR=$(find race-minecraft/target -maxdepth 1 -type f -name "*.jar" ! -name "*sources.jar" ! -name "*javadoc.jar" | head -n 1)
          HT_JAR=$(find race-hytale/target -maxdepth 1 -type f -name "*.jar" ! -name "*sources.jar" ! -name "*javadoc.jar" | head -n 1)

          if [ -z "$MC_JAR" ]; then
            echo "Minecraft JAR not found"
            exit 1
          fi

          if [ -z "$HT_JAR" ]; then
            echo "Hytale JAR not found"
            exit 1
          fi

          echo "mc_jar=$MC_JAR" >> $GITHUB_OUTPUT
          echo "ht_jar=$HT_JAR" >> $GITHUB_OUTPUT

          echo "Minecraft JAR: $MC_JAR"
          echo "Hytale JAR: $HT_JAR"

      - name: Publish Minecraft release
        run: |
          curl --fail -X POST "$BLUEVA_UPDATE_URL" \
            -H "Authorization: Bearer ${{ secrets.BLUEVA_API_KEY }}" \
            -F "resource_id=${{ secrets.BLUEVA_RESOURCE_ID }}" \
            -F "channel_id=${{ secrets.BLUEVA_CHANNEL_ID_MINECRAFT }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "title=Race Minecraft ${{ steps.version.outputs.version }}" \
            -F "changelog=Automated release from commit ${{ github.sha }}" \
            -F "file=@${{ steps.jars.outputs.mc_jar }}"

      - name: Publish Hytale release
        run: |
          curl --fail -X POST "$BLUEVA_UPDATE_URL" \
            -H "Authorization: Bearer ${{ secrets.BLUEVA_API_KEY }}" \
            -F "resource_id=${{ secrets.BLUEVA_RESOURCE_ID }}" \
            -F "channel_id=${{ secrets.BLUEVA_CHANNEL_ID_HYTALE }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "title=Race Hytale ${{ steps.version.outputs.version }}" \
            -F "changelog=Automated release from commit ${{ github.sha }}" \
            -F "file=@${{ steps.jars.outputs.ht_jar }}"
